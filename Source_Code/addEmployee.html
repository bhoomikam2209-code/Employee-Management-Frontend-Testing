<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Add Employee</h2>

        <form id="employeeForm">

            <label>Employee ID</label>
            <input type="text" id="empId" placeholder="Enter Employee ID" required>

            <label>Employee Name</label>
            <input type="text" id="empName" placeholder="Enter Employee Name" required>

            <label>Department</label>
            <input type="text" id="department" placeholder="Enter Department" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter Email" required>

            <label>Salary</label>
            <input type="number" id="salary" placeholder="Enter Salary" required>

            <button type="submit">Add Employee</button>

        </form>

        <br>

        <a href="dashboard.html">
            <button>Back to Dashboard</button>
        </a>

    </div>

    <script>
        document.getElementById("employeeForm").addEventListener("submit", function(event) {
            event.preventDefault();

            alert("Employee Added Successfully!");

            document.getElementById("employeeForm").reset();
        });
    </script>

</body>
</html>
